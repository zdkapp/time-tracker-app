name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.16.9'  # 使用更稳定的版本
        
    - name: Install dependencies
      run: |
        flutter pub get
        flutter pub deps
        
    - name: Analyze code
      run: flutter analyze
      
    - name: Run tests
      run: flutter test
      
    - name: Build APK
      run: |
        flutter build apk --release --verbose
        ls -la build/app/outputs/flutter-apk/
        
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: time-tracker-app
        path: build/app/outputs/flutter-apk/app-release.apk
        retention-days: 30
        
    - name: Upload build logs
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: build-logs
        path: |
          flutter.log
          build.log
        retention-days: 7